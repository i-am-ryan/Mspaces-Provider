name: mspaces_provider
description: Mspaces Provider App
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.1.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0
  intl: ^0.20.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  cloud_functions: ^6.0.7
  image_picker: ^1.2.1
  firebase_storage: ^13.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/